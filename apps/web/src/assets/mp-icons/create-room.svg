<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Create Room">
  <defs>
    <linearGradient id="crBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="crRoof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="crWall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Backdrop -->
  <circle cx="32" cy="32" r="30" fill="url(#crBg)"/>
  <!-- Sparkle dots (architectural mood) -->
  <g fill="#c7d2fe" opacity="0.7">
    <circle cx="11" cy="14" r="1.2"/>
    <circle cx="53" cy="16" r="1.4"/>
    <circle cx="50" cy="50" r="1"/>
    <circle cx="14" cy="50" r="1.2"/>
  </g>
  <!-- House silhouette with rounded corners -->
  <g stroke="#312e81" stroke-width="1.6" stroke-linejoin="round">
    <!-- Roof -->
    <path d="M14 28 L32 12 L50 28 Z" fill="url(#crRoof)"/>
    <!-- Walls (rounded body) -->
    <path
      d="M18 28 L18 48 Q18 52 22 52 L42 52 Q46 52 46 48 L46 28 Z"
      fill="url(#crWall)"
    />
    <!-- Door -->
    <path d="M28 52 L28 38 Q28 36 30 36 L34 36 Q36 36 36 38 L36 52 Z" fill="#1e1b4b"/>
    <!-- Door knob -->
    <circle cx="34" cy="44" r="0.9" fill="#fde68a" stroke="none"/>
  </g>
  <!-- "+" badge in upper-right indicating "Create" -->
  <g>
    <circle cx="49" cy="20" r="7" fill="#22c55e" stroke="#0a0f1e" stroke-width="1.2"/>
    <path d="M49 16.5 L49 23.5 M45.5 20 L52.5 20" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
  </g>
</svg>
