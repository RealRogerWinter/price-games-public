<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Quick Play">
  <defs>
    <radialGradient id="qpBg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#f6c90e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f6c90e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="qpBolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7c2"/>
      <stop offset="50%" stop-color="#f6c90e"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="qpGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Soft radial backdrop -->
  <circle cx="32" cy="32" r="30" fill="url(#qpBg)"/>
  <!-- Speed lines around the bolt -->
  <g stroke="#f6c90e" stroke-width="1.6" stroke-linecap="round" opacity="0.55">
    <line x1="9" y1="20" x2="15" y2="22"/>
    <line x1="7" y1="32" x2="14" y2="32"/>
    <line x1="9" y1="44" x2="15" y2="42"/>
    <line x1="55" y1="20" x2="49" y2="22"/>
    <line x1="57" y1="32" x2="50" y2="32"/>
    <line x1="55" y1="44" x2="49" y2="42"/>
  </g>
  <!-- Lightning bolt with embedded play triangle -->
  <g filter="url(#qpGlow)">
    <path
      d="M36 6 L18 34 L28 34 L24 58 L46 28 L34 28 L40 6 Z"
      fill="url(#qpBolt)"
      stroke="#92400e"
      stroke-width="1.4"
      stroke-linejoin="round"
    />
    <!-- Embedded play triangle inside the bolt's wide section -->
    <path d="M27 22 L33 26 L27 30 Z" fill="#fff" opacity="0.85"/>
  </g>
</svg>
