<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Daily challenge trophy">
  <defs>
    <!-- Gold gradient matching #FFD24A → #F2A000 -->
    <linearGradient id="dt-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE28A"/>
      <stop offset="45%" stop-color="#FFD24A"/>
      <stop offset="100%" stop-color="#E68A00"/>
    </linearGradient>
    <linearGradient id="dt-gold-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF0B0"/>
      <stop offset="100%" stop-color="#F2A000"/>
    </linearGradient>
    <linearGradient id="dt-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFC830"/>
      <stop offset="100%" stop-color="#C97A00"/>
    </linearGradient>
    <radialGradient id="dt-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE066" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#FFE066" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Warm glow -->
  <circle cx="60" cy="60" r="56" fill="url(#dt-glow)"/>

  <!-- Radiating sparkles -->
  <g fill="#FFE066" opacity="0.95" stroke="#6B3A00" stroke-width="1.4" stroke-linejoin="round">
    <path d="M14 28 l3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3z"/>
    <path d="M104 22 l2.5 5.5 5.5 2.5 -5.5 2.5 -2.5 5.5 -2.5 -5.5 -5.5 -2.5 5.5 -2.5z"/>
    <path d="M100 80 l2 4 4 2 -4 2 -2 4 -2 -4 -4 -2 4 -2z"/>
  </g>

  <!-- Handles (ears) -->
  <path d="M24 40 C12 40 10 64 30 70 L30 58 C22 56 22 46 30 46 Z"
        fill="url(#dt-gold-rim)" stroke="#3A1F00" stroke-width="3" stroke-linejoin="round"/>
  <path d="M96 40 C108 40 110 64 90 70 L90 58 C98 56 98 46 90 46 Z"
        fill="url(#dt-gold-rim)" stroke="#3A1F00" stroke-width="3" stroke-linejoin="round"/>

  <!-- Cup body -->
  <path d="M28 32
           L92 32
           L88 68
           Q86 80 78 84
           Q70 88 60 88
           Q50 88 42 84
           Q34 80 32 68 Z"
        fill="url(#dt-gold)" stroke="#3A1F00" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Rim band -->
  <path d="M28 32 L92 32 L90 40 L30 40 Z"
        fill="url(#dt-gold-rim)" stroke="#3A1F00" stroke-width="3" stroke-linejoin="round"/>

  <!-- Glossy highlight -->
  <path d="M36 46 Q34 60 42 74" fill="none" stroke="#FFF6D0" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

  <!-- Kawaii face -->
  <circle cx="50" cy="58" r="3.2" fill="#1B0E00"/>
  <circle cx="70" cy="58" r="3.2" fill="#1B0E00"/>
  <circle cx="51.4" cy="57" r="1.1" fill="#FFFFFF"/>
  <circle cx="71.4" cy="57" r="1.1" fill="#FFFFFF"/>
  <circle cx="44" cy="65" r="3" fill="#FF9AA2" opacity="0.75"/>
  <circle cx="76" cy="65" r="3" fill="#FF9AA2" opacity="0.75"/>
  <path d="M55 66 Q60 72 65 66" fill="none" stroke="#1B0E00" stroke-width="2.4" stroke-linecap="round"/>

  <!-- Star on front -->
  <path d="M60 44 l1.6 3.4 3.7 0.4 -2.8 2.5 0.8 3.7 -3.3 -1.9 -3.3 1.9 0.8 -3.7 -2.8 -2.5 3.7 -0.4z"
        fill="#FFF2B0" stroke="#6B3A00" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- Neck / stem -->
  <path d="M48 88 L72 88 L70 96 L50 96 Z"
        fill="url(#dt-base)" stroke="#3A1F00" stroke-width="3" stroke-linejoin="round"/>

  <!-- Base -->
  <path d="M36 96 L84 96 Q88 96 88 100 L88 108 Q88 112 84 112 L36 112 Q32 112 32 108 L32 100 Q32 96 36 96 Z"
        fill="url(#dt-base)" stroke="#3A1F00" stroke-width="3.5" stroke-linejoin="round"/>
  <path d="M36 99 L84 99" stroke="#FFF6D0" stroke-width="1.6" opacity="0.75" stroke-linecap="round"/>
</svg>
