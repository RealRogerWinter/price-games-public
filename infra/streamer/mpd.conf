# mpd config for the streamer container. Plays files from the music
# volume into the Pulseaudio "broadcast" sink. Operators drop
# royalty-free .mp3/.flac/.ogg files into the mounted music dir; mpd
# rescans on container start.

music_directory   "/var/streamer/music"
playlist_directory "/var/streamer/data/playlists"
db_file           "/var/streamer/data/mpd.db"
log_file          "syslog"
state_file        "/var/streamer/data/mpd.state"
sticker_file      "/var/streamer/data/sticker.sql"
pid_file          "/tmp/mpd.pid"

bind_to_address "127.0.0.1"
port            "6600"

audio_output {
  type   "pulse"
  name   "broadcast"
  sink   "broadcast"
}

# Loop the playlist so a 24/7 stream never falls into silence.
restore_paused "no"
auto_update    "yes"

# Volume kept slightly under unity so TTS sits clearly on top.
mixer_type     "software"
replaygain     "track"
